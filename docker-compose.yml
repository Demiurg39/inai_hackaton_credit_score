services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finguard-bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - LLM_URL=${LLM_URL:-http://localhost:8000/v1/chat}
      - TRITON_URL=http://triton:8000/v2/models/category_model/infer
    depends_on:
      - triton
    ports:
      - "8080:8080"
    command: ["python", "bot.py"]

  triton:
    build:
      context: .
      dockerfile: triton.Dockerfile
    container_name: finguard-triton
    volumes:
      - ./model_repository:/models
    command: ["tritonserver", "--model-repository=/models"]
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5