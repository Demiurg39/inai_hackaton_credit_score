services:
  triton:
    build:
      context: .
      dockerfile: triton.Dockerfile
    container_name: score-triton
    command: [
      "tritonserver",
      "--model-repository=s3://${S3_BUCKET}/${S3_MODEL_PATH}",
      "--s3-endpoint=${S3_ENDPOINT}",
      "--s3-use-ssl=true",
      "--s3-region=auto",
      "--s3-access-key-id=${S3_ACCESS_KEY}",
      "--s3-secret-access-key=${S3_SECRET_KEY}"
    ]
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: score-api
    environment:
      - TRITON_URL=http://triton:8000/v2/models/score_model/infer
      - HOST=0.0.0.0
      - PORT=8000
    depends_on:
      - triton
    ports:
      - "8003:8000"
    command: ["python", "main.py"]
