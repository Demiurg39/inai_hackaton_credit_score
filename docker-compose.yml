services:
  triton:
    image: nvcr.io/nvidia/tritonserver:24.03-py3
    volumes:
      - ./model_repository:/models
    command: ["tritonserver", "--model-repository=/models"]
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: score-api
    environment:
      - TRITON_URL=http://triton:8000/v2/models/score_model/infer
      - HOST=0.0.0.0
      - PORT=8000
    depends_on:
      - triton
    ports:
      - "8003:8000"
    command: ["python", "main.py"]